<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100">
  <!--
    Zephyr Logo
    Mark: wind-curved Z on teal rounded square (100×100) — crop to this for favicon
    Full: mark + wordmark (380×100)
    Primary colour: teal-600 #0d9488 (light mode)
  -->

  <!-- ── Mark ─────────────────────────────────────────────────────── -->
  <rect x="0" y="0" width="100" height="100" rx="16" fill="#0d9488"/>

  <!-- Z: three wind-curved strokes -->
  <!-- Top bar – bows upward (wind lift) -->
  <path d="M 17 32 C 43 17 57 17 83 32"
        stroke="white" stroke-width="9" fill="none"
        stroke-linecap="round"/>
  <!-- Diagonal – top-right to bottom-left -->
  <path d="M 83 32 C 57 51 43 51 17 68"
        stroke="white" stroke-width="9" fill="none"
        stroke-linecap="round"/>
  <!-- Bottom bar – bows downward (wind trail) -->
  <path d="M 17 68 C 43 83 57 83 83 68"
        stroke="white" stroke-width="9" fill="none"
        stroke-linecap="round"/>

  <!-- ── Wordmark ───────────────────────────────────────────────────── -->
  <text x="118" y="67"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="48"
        font-weight="700"
        letter-spacing="-1"
        fill="#0d9488">Zephyr</text>
</svg>
